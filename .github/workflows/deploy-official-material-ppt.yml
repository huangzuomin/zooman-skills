name: Deploy official-material-workflow PPT

on:
  push:
    branches:
      - main
    paths:
      - "skills/official-material-workflow/ppt/**"
      - ".github/workflows/deploy-official-material-ppt.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "official-material-workflow-ppt"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload PPT artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: skills/official-material-workflow/ppt

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
