agent_short_description = "适用于弱模型单机离线场景的精简机关材料写作 profile"
agent_default_prompt = "使用 $official-material-workflow 按固定文种模板起草一份中文机关材料或正式文稿；若模型较弱，优先使用 small-local profile。"
allow_implicit_invocation = true
default_template = "prompts/core/fallback-template.md"
