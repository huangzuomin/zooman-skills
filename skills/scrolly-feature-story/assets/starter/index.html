<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scrolly Feature Story Starter</title>
    <meta name="description" content="Starter template for a scrollytelling feature story.">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>
    <header class="site-header">
      <nav aria-label="章节导航">
        <a href="#opening">开场</a>
        <a href="#story">叙事</a>
        <a href="#close">结尾</a>
      </nav>
    </header>
    <main id="main">
      <section id="opening" class="section hero">
        <p class="eyebrow">Scrollytelling</p>
        <h1>滚动叙事专题标题</h1>
        <p class="lede">用一条清晰的滚动路径，把复杂内容讲成有节奏的网页故事。</p>
      </section>
      <section id="story" class="section sticky-story">
        <div class="sticky-visual" aria-hidden="true">
          <div class="visual-mark"></div>
        </div>
        <div class="steps">
          <article class="step">
            <h2>第一层信息</h2>
            <p>解释背景、问题或用户需要理解的第一件事。</p>
          </article>
          <article class="step">
            <h2>第二层信息</h2>
            <p>展示结构、能力、证据或关键变化。</p>
          </article>
          <article class="step">
            <h2>第三层信息</h2>
            <p>把分散信息收束成方案、判断或行动路径。</p>
          </article>
        </div>
      </section>
      <section id="close" class="section close">
        <h2>结束页主张</h2>
        <p>用一句有力的话收束整篇叙事。</p>
      </section>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
